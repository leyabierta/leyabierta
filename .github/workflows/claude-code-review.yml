name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.draft == false &&
      (
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR' ||
        contains(github.event.pull_request.labels.*.name, 'claude-review')
      )
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@59e5b24f8332f1feda2f9d9a52aaa464b048644e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Focus on:

            1. **Bugs & Correctness** - Logic errors, edge cases, race conditions
            2. **Security** - Vulnerabilities, input validation, auth issues
            3. **Performance** - Bottlenecks, unnecessary computations
            4. **Code Quality** - Readability, maintainability, consistency with codebase patterns

            Use inline comments for specific issues found in the diff.
            Post a summary comment at the end with your overall assessment.
            If no significant issues are found, post a brief approval comment.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*),Read,Glob,Grep"
