name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

env:
  TRILO_BOT_TOKEN: ${{ secrets.TRILO_BOT_TOKEN }}
  TRILO_PROJECT_ID: "ef505489-efc2-46ce-bc70-950e5d34025d"
  TRILO_BACKEND_URL: "https://api.trilo.chat"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: leyabierta/leyes
          path: content/laws
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify — Started
        id: notify
        continue-on-error: true
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="🚀 **Deploy Web** · \`${COMMIT_SHA}\` ${COMMIT_MSG}"
          MSG+=$'\n\n'"⏳ **web** — Installing..."
          MSG+=$'\n\n'"[View run](${RUN_URL})"
          MSG_ID=$(.github/scripts/trilo-notify.sh send "$MSG")
          echo "msg_id=${MSG_ID}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Notify — Building
        continue-on-error: true
        run: .github/scripts/trilo-notify.sh set-status "${{ steps.notify.outputs.msg_id }}" "web" "⏳ **web** — Building..."

      - name: Build Astro
        working-directory: packages/web
        run: bun run build
        env:
          LAWS_PATH: content/laws

      - name: Notify — Deploying
        continue-on-error: true
        run: .github/scripts/trilo-notify.sh set-status "${{ steps.notify.outputs.msg_id }}" "web" "⏳ **web** — Deploying to Cloudflare..."

      - name: Deploy to Cloudflare Pages
        working-directory: packages/web
        run: bunx wrangler pages deploy dist --project-name=leyabierta
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify — Result
        if: always()
        continue-on-error: true
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start_time }} ))
          MINS=$((ELAPSED / 60))
          SECS=$((ELAPSED % 60))
          DURATION="${MINS}m ${SECS}s"
          NOTIFY_MSG_ID="${{ steps.notify.outputs.msg_id }}"
          if [ "${{ job.status }}" = "success" ]; then
            .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "web" "✅ **web** — Deployed ($DURATION)"
            .github/scripts/trilo-notify.sh send "✅ **leyabierta web** deployed ($DURATION)"
          elif [ "${{ job.status }}" = "cancelled" ]; then
            .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "web" "⚪ **web** — Cancelled"
          else
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "web" "❌ **web** — Failed ($DURATION)"
            .github/scripts/trilo-notify.sh send "$(printf '❌ **leyabierta web** failed (%s) — [View logs](%s)' "$DURATION" "$RUN_URL")"
          fi
