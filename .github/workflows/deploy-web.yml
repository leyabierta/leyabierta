name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "packages/pipeline/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: leyabierta/leyes
          path: content/laws
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify — Started
        id: notify
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: |
            🚀 **Deploy Web** · `${{ github.sha }}`

            ⏳ **web** — Installing...

            [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/*/node_modules
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Astro content store
        uses: actions/cache@v4
        with:
          path: packages/web/.astro
          key: astro-data-${{ hashFiles('content/laws/**/*.md') }}
          restore-keys: astro-data-

      - name: Notify — Building
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: web
          new-status: "⏳ **web** — Building..."

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 10); do
            if curl -sf https://api.leyabierta.es/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... (attempt $i/10)"
            sleep 5
          done
          echo "::warning::API not reachable after 50s — build may miss digest pages"

      - name: Build Astro
        working-directory: packages/web
        run: bun run build
        env:
          LAWS_PATH: content/laws

      - name: Notify — Deploying
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: web
          new-status: "⏳ **web** — Deploying to Cloudflare..."

      - name: Deploy to Cloudflare Pages
        working-directory: packages/web
        run: bunx wrangler pages deploy dist --project-name=leyabierta
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Calculate duration
        if: always()
        id: duration
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start_time }} ))
          echo "text=$((ELAPSED / 60))m $((ELAPSED % 60))s" >> $GITHUB_OUTPUT

      - name: Notify — Success status
        if: always() && job.status == 'success'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: web
          new-status: "✅ **web** — Deployed (${{ steps.duration.outputs.text }})"

      - name: Notify — Success message
        if: always() && job.status == 'success'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: "✅ **leyabierta web** deployed (${{ steps.duration.outputs.text }})"

      - name: Notify — Cancelled
        if: always() && job.status == 'cancelled'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: web
          new-status: "⚪ **web** — Cancelled"

      - name: Notify — Failed status
        if: always() && job.status == 'failure'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: web
          new-status: "❌ **web** — Failed (${{ steps.duration.outputs.text }})"

      - name: Notify — Failed message
        if: always() && job.status == 'failure'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: "❌ **leyabierta web** failed (${{ steps.duration.outputs.text }}) — [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
