name: Daily Pipeline

on:
  schedule:
    # Incremental: Mon-Sat 06:00 UTC (new norms only)
    - cron: "0 6 * * 1-6"
    # Full re-check: Sunday 04:00 UTC (catches updates to existing norms)
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-process all norms (catches updates to existing norms)"
        type: boolean
        default: false

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

env:
  TRILO_BOT_TOKEN: ${{ secrets.TRILO_BOT_TOKEN }}
  TRILO_PROJECT_ID: "ef505489-efc2-46ce-bc70-950e5d34025d"
  TRILO_BACKEND_URL: "https://api.trilo.chat"

jobs:
  pipeline:
    name: Fetch & Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: leyabierta/leyes
          path: leyes
          token: ${{ secrets.LEYES_PUSH_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Determine mode
        id: mode
        run: |
          # Sunday cron or manual --force → re-process all
          if [[ "${{ github.event.schedule }}" == "0 4 * * 0" ]] || [[ "${{ inputs.force }}" == "true" ]]; then
            echo "force=--force" >> "$GITHUB_OUTPUT"
            echo "label=FULL" >> "$GITHUB_OUTPUT"
            echo "Mode: FULL (re-checking all norms for updates)"
          else
            echo "force=" >> "$GITHUB_OUTPUT"
            echo "label=INCREMENTAL" >> "$GITHUB_OUTPUT"
            echo "Mode: INCREMENTAL (new norms only)"
          fi

      - name: Notify — Started
        id: notify
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="⚙️ **Pipeline** · ${{ steps.mode.outputs.label }}"
          MSG+=$'\n\n'"⏳ **pipeline** — Installing..."
          MSG+=$'\n\n'"[View run](${RUN_URL})"
          MSG_ID=$(.github/scripts/trilo-notify.sh send "$MSG")
          echo "msg_id=${MSG_ID}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache pipeline state between runs
      - uses: actions/cache@v4
        with:
          path: data/state.json
          key: pipeline-state-${{ github.run_number }}
          restore-keys: pipeline-state-

      # Cache fetched JSON files between runs
      - uses: actions/cache@v4
        with:
          path: data/json
          key: pipeline-json-${{ github.run_number }}
          restore-keys: pipeline-json-

      # If no cached state.json, seed it from existing leyes files
      # This prevents re-downloading all 12K norms on first run
      - name: Seed state from existing leyes
        run: |
          if [ ! -f data/state.json ]; then
            echo "No cached state — seeding from leyes repo..."
            mkdir -p data
            node -e "
              const fs = require('fs');
              const path = require('path');
              const state = { version: 1, country: 'es', norms: {} };
              function walk(dir) {
                for (const f of fs.readdirSync(dir, { withFileTypes: true })) {
                  if (f.isDirectory()) walk(path.join(dir, f.name));
                  else if (f.name.endsWith('.md')) {
                    const id = f.name.replace('.md', '');
                    state.norms[id] = { id, status: 'done', commits: 0, processedAt: new Date().toISOString() };
                  }
                }
              }
              walk('leyes');
              fs.writeFileSync('data/state.json', JSON.stringify(state, null, 2));
              console.log('Seeded ' + Object.keys(state.norms).length + ' norms');
            "
          else
            echo "Using cached state.json"
          fi

      - name: Notify — Running pipeline
        run: .github/scripts/trilo-notify.sh set-status "${{ steps.notify.outputs.msg_id }}" "pipeline" "⏳ **pipeline** — Fetching norms from BOE..."

      - name: Run pipeline
        run: bun run pipeline bootstrap --country es --concurrency 4 ${{ steps.mode.outputs.force }}
        env:
          REPO_PATH: ./leyes

      - name: Check for changes
        id: changes
        working-directory: leyes
        run: |
          if git diff --quiet HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No new reforms found"
          else
            COUNT=$(git log --oneline HEAD --not $(git rev-parse HEAD~1 2>/dev/null || echo HEAD) 2>/dev/null | wc -l || echo 0)
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "New commits: $COUNT"
          fi

      - name: Notify — Pushing
        if: steps.changes.outputs.has_changes == 'true'
        run: .github/scripts/trilo-notify.sh set-status "${{ steps.notify.outputs.msg_id }}" "pipeline" "⏳ **pipeline** — Pushing ${{ steps.changes.outputs.count }} commits..."

      - name: Push changes to leyes
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: leyes
        run: git push

      - name: Trigger deploy
        if: steps.changes.outputs.has_changes == 'true'
        run: gh workflow run deploy-web.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notify — Result
        if: always()
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start_time }} ))
          MINS=$((ELAPSED / 60))
          SECS=$((ELAPSED % 60))
          DURATION="${MINS}m ${SECS}s"
          NOTIFY_MSG_ID="${{ steps.notify.outputs.msg_id }}"
          CHANGES="${{ steps.changes.outputs.has_changes }}"
          COUNT="${{ steps.changes.outputs.count }}"
          if [ "${{ job.status }}" = "success" ]; then
            if [ "$CHANGES" = "true" ]; then
              .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "pipeline" "✅ **pipeline** — Done, ${COUNT} new commits ($DURATION)"
              .github/scripts/trilo-notify.sh send "✅ **leyabierta pipeline** — ${COUNT} new commits pushed ($DURATION)"
            else
              .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "pipeline" "✅ **pipeline** — No changes ($DURATION)"
              .github/scripts/trilo-notify.sh send "✅ **leyabierta pipeline** — no new reforms ($DURATION)"
            fi
          elif [ "${{ job.status }}" = "cancelled" ]; then
            .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "pipeline" "⚪ **pipeline** — Cancelled"
          else
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "pipeline" "❌ **pipeline** — Failed ($DURATION)"
            .github/scripts/trilo-notify.sh send "$(printf '❌ **leyabierta pipeline** failed (%s) — [View logs](%s)' "$DURATION" "$RUN_URL")"
          fi
