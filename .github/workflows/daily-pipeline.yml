name: Daily Pipeline

on:
  schedule:
    # Incremental: Mon-Sat 06:00 UTC (new norms only)
    - cron: "0 6 * * 1-6"
    # Full re-check: Sunday 04:00 UTC (catches updates to existing norms)
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-process all norms (catches updates to existing norms)"
        type: boolean
        default: false

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Fetch & Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: leyabierta/leyes
          path: leyes
          token: ${{ secrets.LEYES_PUSH_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache pipeline state between runs
      - uses: actions/cache@v4
        with:
          path: data/state.json
          key: pipeline-state-${{ github.run_number }}
          restore-keys: pipeline-state-

      # Cache fetched JSON files between runs
      - uses: actions/cache@v4
        with:
          path: data/json
          key: pipeline-json-${{ github.run_number }}
          restore-keys: pipeline-json-

      # If no cached state.json, seed it from existing leyes files
      # This prevents re-downloading all 12K norms on first run
      - name: Seed state from existing leyes
        run: |
          if [ ! -f data/state.json ]; then
            echo "No cached state — seeding from leyes repo..."
            mkdir -p data
            node -e "
              const fs = require('fs');
              const path = require('path');
              const state = { version: 1, country: 'es', norms: {} };
              function walk(dir) {
                for (const f of fs.readdirSync(dir, { withFileTypes: true })) {
                  if (f.isDirectory()) walk(path.join(dir, f.name));
                  else if (f.name.endsWith('.md')) {
                    const id = f.name.replace('.md', '');
                    state.norms[id] = { id, status: 'done', commits: 0, processedAt: new Date().toISOString() };
                  }
                }
              }
              walk('leyes');
              fs.writeFileSync('data/state.json', JSON.stringify(state, null, 2));
              console.log('Seeded ' + Object.keys(state.norms).length + ' norms');
            "
          else
            echo "Using cached state.json"
          fi

      - name: Determine mode
        id: mode
        run: |
          # Sunday cron or manual --force → re-process all
          if [[ "${{ github.event.schedule }}" == "0 4 * * 0" ]] || [[ "${{ inputs.force }}" == "true" ]]; then
            echo "force=--force" >> "$GITHUB_OUTPUT"
            echo "Mode: FULL (re-checking all norms for updates)"
          else
            echo "force=" >> "$GITHUB_OUTPUT"
            echo "Mode: INCREMENTAL (new norms only)"
          fi

      - name: Run pipeline
        run: bun run pipeline bootstrap --country es --concurrency 4 ${{ steps.mode.outputs.force }}
        env:
          REPO_PATH: ./leyes

      - name: Check for changes
        id: changes
        working-directory: leyes
        run: |
          if git diff --quiet HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new reforms found"
          else
            COUNT=$(git log --oneline HEAD --not $(git rev-parse HEAD~1 2>/dev/null || echo HEAD) 2>/dev/null | wc -l || echo 0)
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "New commits: $COUNT"
          fi

      - name: Push changes to leyes
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: leyes
        run: git push

      - name: Trigger deploy
        if: steps.changes.outputs.has_changes == 'true'
        run: gh workflow run deploy-web.yml
        env:
          GH_TOKEN: ${{ github.token }}
