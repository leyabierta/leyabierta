name: Daily Pipeline

on:
  schedule:
    # Daily 06:00 UTC (08:00 Madrid) — scans full catalog, only fetches changed norms
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-process all norms (re-fetches everything, ignores change detection)"
        type: boolean
        default: false

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Fetch & Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: leyabierta/leyes
          path: leyes
          token: ${{ secrets.LEYES_PUSH_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Determine mode
        id: mode
        run: |
          if [[ "${{ inputs.force }}" == "true" ]]; then
            echo "force=--force" >> "$GITHUB_OUTPUT"
            echo "label=FULL" >> "$GITHUB_OUTPUT"
            echo "Mode: FULL (re-fetching all norms)"
          else
            echo "force=" >> "$GITHUB_OUTPUT"
            echo "label=DAILY" >> "$GITHUB_OUTPUT"
            echo "Mode: DAILY (scanning catalog for changes)"
          fi

      - name: Notify — Started
        id: notify
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: |
            ⚙️ **Pipeline** · ${{ steps.mode.outputs.label }}

            ⏳ **pipeline** — Installing...

            [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache pipeline state between runs
      - uses: actions/cache@v4
        with:
          path: data/state.json
          key: pipeline-state-${{ github.run_number }}
          restore-keys: pipeline-state-

      # Cache fetched JSON files between runs
      - uses: actions/cache@v4
        with:
          path: data/json
          key: pipeline-json-${{ github.run_number }}
          restore-keys: pipeline-json-

      # If no cached state.json, seed it from existing leyes files
      # This prevents re-downloading all 12K norms on first run
      - name: Seed state from existing leyes
        run: |
          if [ ! -f data/state.json ]; then
            echo "No cached state — seeding from leyes repo..."
            mkdir -p data
            node -e "
              const fs = require('fs');
              const path = require('path');
              const state = { version: 1, country: 'es', norms: {} };
              function walk(dir) {
                for (const f of fs.readdirSync(dir, { withFileTypes: true })) {
                  if (f.isDirectory()) walk(path.join(dir, f.name));
                  else if (f.name.endsWith('.md')) {
                    const id = f.name.replace('.md', '');
                    state.norms[id] = { id, status: 'done', commits: 0, processedAt: new Date().toISOString() };
                  }
                }
              }
              walk('leyes');
              fs.writeFileSync('data/state.json', JSON.stringify(state, null, 2));
              console.log('Seeded ' + Object.keys(state.norms).length + ' norms');
            "
          else
            echo "Using cached state.json"
          fi

      - name: Notify — Running pipeline
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: pipeline
          new-status: "⏳ **pipeline** — Fetching norms from BOE..."

      - name: Configure git identity
        working-directory: leyes
        run: |
          git config user.name "Ley Abierta"
          git config user.email "bot@leyabierta.es"

      - name: Run pipeline
        run: bun run pipeline bootstrap --country es --concurrency 4 ${{ steps.mode.outputs.force }}
        env:
          REPO_PATH: ./leyes

      - name: Check for changes
        id: changes
        working-directory: leyes
        run: |
          COUNT=$(git rev-list origin/main..HEAD --count 2>/dev/null || echo 0)
          if [ "$COUNT" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No new reforms found"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "New commits: $COUNT"
          fi

      - name: Notify — Pushing
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: pipeline
          new-status: "⏳ **pipeline** — Pushing ${{ steps.changes.outputs.count }} commits..."

      - name: Push changes to leyes
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: leyes
        run: git push

      - name: Trigger deploy
        if: steps.changes.outputs.has_changes == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Calculate duration
        if: always()
        id: duration
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start_time }} ))
          echo "text=$((ELAPSED / 60))m $((ELAPSED % 60))s" >> $GITHUB_OUTPUT

      - name: Notify — Success with changes (status)
        if: always() && job.status == 'success' && steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: pipeline
          new-status: "✅ **pipeline** — Done, ${{ steps.changes.outputs.count }} new commits (${{ steps.duration.outputs.text }})"

      - name: Notify — Success with changes (message)
        if: always() && job.status == 'success' && steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: "✅ **leyabierta pipeline** — ${{ steps.changes.outputs.count }} new commits pushed (${{ steps.duration.outputs.text }})"

      - name: Notify — Success no changes (status)
        if: always() && job.status == 'success' && steps.changes.outputs.has_changes != 'true'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: pipeline
          new-status: "✅ **pipeline** — No changes (${{ steps.duration.outputs.text }})"

      - name: Notify — Success no changes (message)
        if: always() && job.status == 'success' && steps.changes.outputs.has_changes != 'true'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: "✅ **leyabierta pipeline** — no new reforms (${{ steps.duration.outputs.text }})"

      - name: Notify — Cancelled
        if: always() && job.status == 'cancelled'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: pipeline
          new-status: "⚪ **pipeline** — Cancelled"

      - name: Notify — Failed status
        if: always() && job.status == 'failure'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: pipeline
          new-status: "❌ **pipeline** — Failed (${{ steps.duration.outputs.text }})"

      - name: Notify — Failed message
        if: always() && job.status == 'failure'
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: "❌ **leyabierta pipeline** failed (${{ steps.duration.outputs.text }}) — [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
