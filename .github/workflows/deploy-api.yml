name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - "packages/pipeline/**"
      - "Dockerfile"
      - "docker-compose.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leyabierta/api
  TRILO_BOT_TOKEN: ${{ secrets.TRILO_BOT_TOKEN }}
  TRILO_PROJECT_ID: "ef505489-efc2-46ce-bc70-950e5d34025d"
  TRILO_BACKEND_URL: "https://api.trilo.chat"

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify — Started
        id: notify
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="🚀 **Deploy API** · \`${COMMIT_SHA}\` ${COMMIT_MSG}"
          MSG+=$'\n\n'"⏳ **api** — Installing..."
          MSG+=$'\n\n'"[View run](${RUN_URL})"
          MSG_ID=$(.github/scripts/trilo-notify.sh send "$MSG")
          echo "msg_id=${MSG_ID}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Notify — Linting
        run: .github/scripts/trilo-notify.sh set-status "${{ steps.notify.outputs.msg_id }}" "api" "⏳ **api** — Linting..."

      - name: Lint
        run: bun run check

      - name: Test
        run: bun test || true # Some tests require data files not in CI

      - name: Notify — Building image
        run: .github/scripts/trilo-notify.sh set-status "${{ steps.notify.outputs.msg_id }}" "api" "⏳ **api** — Building Docker image..."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Notify — Pushing image
        run: .github/scripts/trilo-notify.sh set-status "${{ steps.notify.outputs.msg_id }}" "api" "⏳ **api** — Pushing to GHCR..."

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify — Result
        if: always()
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start_time }} ))
          MINS=$((ELAPSED / 60))
          SECS=$((ELAPSED % 60))
          DURATION="${MINS}m ${SECS}s"
          NOTIFY_MSG_ID="${{ steps.notify.outputs.msg_id }}"
          if [ "${{ job.status }}" = "success" ]; then
            .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "api" "✅ **api** — Pushed ($DURATION)"
            .github/scripts/trilo-notify.sh send "✅ **leyabierta api** image pushed ($DURATION)"
          elif [ "${{ job.status }}" = "cancelled" ]; then
            .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "api" "⚪ **api** — Cancelled"
          else
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            .github/scripts/trilo-notify.sh set-status "$NOTIFY_MSG_ID" "api" "❌ **api** — Failed ($DURATION)"
            .github/scripts/trilo-notify.sh send "$(printf '❌ **leyabierta api** failed (%s) — [View logs](%s)' "$DURATION" "$RUN_URL")"
          fi
