name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - "packages/pipeline/**"
      - "Dockerfile"
      - "docker-compose.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leyabierta/api

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify — Started
        id: notify
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: |
            🚀 **Deploy API** · `${{ github.sha }}` ${{ github.event.head_commit.message }}

            ⏳ **api** — Installing...

            [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Notify — Linting
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: api
          new-status: "⏳ **api** — Linting..."

      - name: Lint
        run: bun run check

      - name: Test
        run: bun test || true # Some tests require data files not in CI

      - name: Notify — Building image
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: api
          new-status: "⏳ **api** — Building Docker image..."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Notify — Pushing image
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: api
          new-status: "⏳ **api** — Pushing to GHCR..."

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Calculate duration
        if: always()
        id: duration
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start_time }} ))
          echo "text=$((ELAPSED / 60))m $((ELAPSED % 60))s" >> $GITHUB_OUTPUT

      - name: Notify — Success status
        if: always() && job.status == 'success'
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: api
          new-status: "✅ **api** — Pushed (${{ steps.duration.outputs.text }})"

      - name: Notify — Success message
        if: always() && job.status == 'success'
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: "✅ **leyabierta api** image pushed (${{ steps.duration.outputs.text }})"

      - name: Notify — Cancelled
        if: always() && job.status == 'cancelled'
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: api
          new-status: "⚪ **api** — Cancelled"

      - name: Notify — Failed status
        if: always() && job.status == 'failure'
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ steps.notify.outputs.message-id }}
          app-name: api
          new-status: "❌ **api** — Failed (${{ steps.duration.outputs.text }})"

      - name: Notify — Failed message
        if: always() && job.status == 'failure'
        continue-on-error: true
        uses: TriloHQ/notify-action@v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: "❌ **leyabierta api** failed (${{ steps.duration.outputs.text }}) — [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
