name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      targets:
        description: "What to deploy (comma-separated: api, web)"
        required: false
        default: "all"
        type: string
  # Fired by leyabierta/leyes on push to main (notify-leyabierta.yml)
  # so the static site rebuilds whenever new laws are published.
  repository_dispatch:
    types: [leyes-updated]

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leyabierta/api

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.api.outputs.deploy }}
      web: ${{ steps.web.outputs.deploy }}
      msg_id: ${{ steps.notify.outputs.message-id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check API
        id: api
        run: |
          TARGETS="${{ github.event.inputs.targets || '' }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # leyes-updated only changes content, never API code
            echo "deploy=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$TARGETS" = "all" ] || [ -z "$TARGETS" ] || echo "$TARGETS" | grep -q "api"; then
              echo "deploy=true" >> $GITHUB_OUTPUT
            else
              echo "deploy=false" >> $GITHUB_OUTPUT
            fi
          else
            PREV=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            if [ -z "$PREV" ]; then
              echo "deploy=true" >> $GITHUB_OUTPUT
            elif ! git diff --quiet "$PREV"..HEAD -- packages/api/ packages/pipeline/ packages/shared/ Dockerfile docker-compose.yml; then
              echo "API changes detected"
              echo "deploy=true" >> $GITHUB_OUTPUT
            else
              echo "No API changes"
              echo "deploy=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Check Web
        id: web
        run: |
          TARGETS="${{ github.event.inputs.targets || '' }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # leyes-updated → always rebuild web to pick up new laws
            echo "Web rebuild triggered by leyes update"
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$TARGETS" = "all" ] || [ -z "$TARGETS" ] || echo "$TARGETS" | grep -q "web"; then
              echo "deploy=true" >> $GITHUB_OUTPUT
            else
              echo "deploy=false" >> $GITHUB_OUTPUT
            fi
          else
            PREV=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            if [ -z "$PREV" ]; then
              echo "deploy=true" >> $GITHUB_OUTPUT
            elif ! git diff --quiet "$PREV"..HEAD -- packages/web/ packages/pipeline/ package.json bun.lock .github/workflows/deploy.yml; then
              echo "Web changes detected"
              echo "deploy=true" >> $GITHUB_OUTPUT
            else
              echo "No web changes"
              echo "deploy=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Notify — Started
        id: notify
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: |
            🚀 **Deploy** · `${{ github.sha }}`

            ${{ steps.api.outputs.deploy == 'true' && '⏳ **api** — Queued' || '⏸️ **api** — Skipped' }}

            ${{ steps.web.outputs.deploy == 'true' && '⏳ **web** — Queued' || '⏸️ **web** — Skipped' }}

            [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  lint:
    name: Lint & test
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run check

      - name: Test
        run: bun test || true # Some tests require data files not in CI

  # ============================================
  # API: Build Docker image, push to GHCR,
  # then deploy locally on self-hosted runner
  # ============================================

  deploy-api:
    name: Deploy API
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: [self-hosted, linux, deploy]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify — Building image
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ needs.detect-changes.outputs.msg_id }}
          app-name: api
          new-status: "⏳ **api** — Building Docker image..."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}

      - name: Wait for watchtower to roll
        run: |
          # Watchtower polls every 30s, pulls latest, and recreates the
          # container. CI does NOT touch docker directly — that used to
          # race with watchtower and fail with "container name in use".
          # We only observe /health and gate the job on the SHA matching.
          for i in $(seq 1 36); do
            VERSION=$(curl -sf http://localhost:3000/health | jq -r '.version // empty' 2>/dev/null || echo "")
            if [ "$VERSION" = "${{ github.sha }}" ]; then
              echo "✅ Watchtower rolled to sha-${{ github.sha }} after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "::error::API did not roll to ${{ github.sha }} within 3 minutes"
          exit 1

      - name: Calculate duration
        if: always()
        id: duration
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start_time }} ))
          echo "text=$((ELAPSED / 60))m $((ELAPSED % 60))s" >> $GITHUB_OUTPUT

      - name: Notify — Result
        if: always()
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ needs.detect-changes.outputs.msg_id }}
          app-name: api
          new-status: "${{ job.status == 'success' && format('✅ **api** — Deployed ({0})', steps.duration.outputs.text) || job.status == 'cancelled' && '⚪ **api** — Cancelled' || format('❌ **api** — Failed ({0})', steps.duration.outputs.text) }}"

  # ============================================
  # Web: Build Astro static site, deploy to
  # Cloudflare Pages. Waits for API if both run.
  # ============================================

  deploy-web:
    name: Deploy Web
    needs: [detect-changes, lint, deploy-api]
    if: |
      always() &&
      needs.detect-changes.outputs.web == 'true' &&
      needs.lint.result == 'success' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # `ref: main` is explicit on purpose. The backstop compares against
      # `repos/leyabierta/leyes/commits/main`; actions/checkout without `ref`
      # follows whatever the leyes default branch happens to be. They agree
      # today, but if they ever diverge the SHA recorded at the end of this job
      # could never equal the backstop's, and the backstop would see permanent
      # drift and rebuild the whole site every 30 minutes.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: leyabierta/leyes
          ref: main
          path: content/laws
          fetch-depth: 1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify — Installing
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ needs.detect-changes.outputs.msg_id }}
          app-name: web
          new-status: "⏳ **web** — Installing..."

      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/*/node_modules
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # NOTE: no Astro content-store cache here on purpose. A previous
      # `actions/cache` step keyed the .astro store on
      # hashFiles('content/laws/**/*.md') — a path that does not exist (the law
      # markdown lives in the separate `leyes` repo, checked out elsewhere). The
      # hash was therefore constant, so CI always restored the SAME stale
      # content store and never re-ran the loader. The result: fichas built with
      # empty `materias` — no materia tags, no "Categorías", and (once #108
      # shipped) no "Normas relacionadas" internal-linking block — silently
      # degrading SEO on every daily deploy. The loader is already fast (it
      # stores the markdown path, not the parsed body — see loaders/laws.ts), so
      # a clean content build each run costs little and is always correct.

      - name: Notify — Building
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ needs.detect-changes.outputs.msg_id }}
          app-name: web
          new-status: "⏳ **web** — Building..."

      - name: Verify API is reachable
        run: |
          for i in $(seq 1 10); do
            if curl -sf https://api.leyabierta.es/health > /dev/null 2>&1; then
              echo "API is reachable"
              exit 0
            fi
            echo "Waiting for API... (attempt $i/10)"
            sleep 5
          done
          echo "::error::API not reachable after 50s"
          exit 1

      - name: Build Astro
        working-directory: packages/web
        run: bash build-with-progress.sh
        env:
          LAWS_PATH: content/laws
          API_BYPASS_KEY: ${{ secrets.API_BYPASS_KEY }}
          # Umami website ID (public, AEPD-compliant analytics).
          # See packages/web/src/layouts/Base.astro: gated by isProd && PUBLIC_UMAMI_WEBSITE_ID
          PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.PUBLIC_UMAMI_WEBSITE_ID }}

      - name: Notify — Deploying
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ needs.detect-changes.outputs.msg_id }}
          app-name: web
          new-status: "⏳ **web** — Deploying to Cloudflare..."

      # Deploy to Cloudflare Workers: the ~12k prebuilt static pages (dist/,
      # via the ASSETS binding) plus a standalone Worker (src/worker/index.ts,
      # no Astro adapter) that SSRs only /cambios/reforma/* on demand.
      # `wrangler deploy` reads wrangler.jsonc in packages/web and bundles the
      # worker itself. NOTE: the leyabierta.es custom domain must be attached
      # to the `leyabierta-web` Worker (one-time Dashboard cutover) for this to
      # serve production; until then it publishes to the *.workers.dev preview.
      - name: Deploy to Cloudflare Workers
        working-directory: packages/web
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Without this, Cloudflare's edge serves the previous build for up to 2h
      # (per the cache rules on leyabierta.es). Purging right after the deploy
      # makes new content visible immediately. Failures are non-fatal: the deploy
      # itself succeeded, the cache will refresh naturally within 2h.
      # Zone ID hardcoded so the token doesn't need Zone:Read scope.
      - name: Purge Cloudflare cache
        continue-on-error: true
        env:
          CF_ZONE_ID: 06b4115e591b907e16f0ea87569006b2 # leyabierta.es
        run: |
          set -euo pipefail
          echo "Purging zone $CF_ZONE_ID..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            --data '{"purge_everything":true}')
          echo "Response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "::warning::purge failed — token likely missing Cache Purge scope. Cache will refresh naturally within 2h."
            exit 0
          fi
          echo "✓ cache purged"

      # Keeps the leyes-rebuild-backstop.yml cache marker (`last-leyes-sha-*`)
      # in sync whenever THIS job is the one that actually rebuilt the site, no
      # matter what triggered it (push, workflow_dispatch, or the primary
      # repository_dispatch from leyes' notify-leyabierta.yml).
      #
      # Without this, the backstop is the only writer of that cache entry, so a
      # primary-path deploy leaves it stale: on a later tick the backstop
      # restores the stale marker, sees drift against a leyes HEAD that is
      # already live, and fires a second, redundant full rebuild (~12k pages).
      #
      # The SHA comes from the `content/laws` checkout above — that is the tree
      # this build actually consumed — never from the dispatch payload.
      #
      # Both steps are continue-on-error: the site is already deployed and
      # purged by the time we get here, so a cache hiccup must not turn the job
      # red (the Trilo notification below reads job.status).
      # NOTE: the default shell here is `bash -e {0}`, not `-euo pipefail`, so
      # the stricter flags are set explicitly.
      - name: Record leyes HEAD SHA as built
        id: leyes-sha
        continue-on-error: true
        run: |
          set -euo pipefail
          SHA=$(git -C content/laws rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "$SHA" > .last-leyes-sha

      # The `sha != ''` guard is load-bearing. If the step above failed, the
      # output is empty and the key collapses to the literal `last-leyes-sha-`,
      # which is exactly the backstop's restore-keys prefix. That entry would
      # then be the newest prefix match forever, the backstop would read an
      # empty last-built SHA, see permanent drift, and rebuild the entire site
      # every 30 minutes. Cache keys cannot be overwritten, so it would not
      # self-heal. `success() &&` is kept because an explicit `if` otherwise
      # replaces the implicit success() gate.
      - name: Sync backstop cache marker
        if: success() && steps.leyes-sha.outputs.sha != ''
        continue-on-error: true
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .last-leyes-sha
          key: last-leyes-sha-${{ steps.leyes-sha.outputs.sha }}

      - name: Calculate duration
        if: always()
        id: duration
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start_time }} ))
          echo "text=$((ELAPSED / 60))m $((ELAPSED % 60))s" >> $GITHUB_OUTPUT

      - name: Notify — Result
        if: always()
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: set-status
          message-id: ${{ needs.detect-changes.outputs.msg_id }}
          app-name: web
          new-status: "${{ job.status == 'success' && format('✅ **web** — Deployed ({0})', steps.duration.outputs.text) || job.status == 'cancelled' && '⚪ **web** — Cancelled' || format('❌ **web** — Failed ({0})', steps.duration.outputs.text) }}"

  # ============================================
  # Final notification
  # ============================================

  notify-result:
    name: Notify result
    needs: [detect-changes, deploy-api, deploy-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send final status
        continue-on-error: true
        uses: TriloHQ/notify-action@4db9f20562607d77b83ee78e6a6c2ff7184ece3f # v1
        with:
          token: ${{ secrets.TRILO_BOT_TOKEN }}
          project-id: ${{ secrets.TRILO_PROJECT_ID }}
          action: send
          message: |
            ${{ (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped') && (needs.deploy-web.result == 'success' || needs.deploy-web.result == 'skipped') && '✅' || '❌' }} **Deploy complete** · `${{ github.sha }}`
            API: ${{ needs.deploy-api.result }} · Web: ${{ needs.deploy-web.result }}
