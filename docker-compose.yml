services:
  api:
    image: ghcr.io/leyabierta/api:latest
    build: . # Fallback for local development
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
      - ./og-images:/app/og-images
    env_file:
      - path: .env.prod
        required: false
    environment:
      - DB_PATH=/data/leyabierta.db
      - REPO_PATH=/data/leyes
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=30
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_ROLLING_RESTART=true
      - DOCKER_API_VERSION=1.54
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    profiles:
      - production

  # Privacy-first analytics. Cookieless, IP hashed with daily rotating salt.
  # AEPD-compliant for analytics without cookie consent.
  # Exposed via Cloudflare Tunnel at analytics.leyabierta.es.
  # Major version pinned (postgresql-v2) so Watchtower auto-updates only patch+minor.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-v2
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - path: .env.prod
        required: false
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
      TRACKER_SCRIPT_NAME: "ley.js"
      COLLECT_API_ENDPOINT: "/data/event"
      REMOVE_TRAILING_SLASH: "1"
      CLIENT_IP_HEADER: "CF-Connecting-IP"
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    profiles:
      - production

  umami-db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      POSTGRES_DB: umami
    volumes:
      - umami-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    profiles:
      - production

volumes:
  umami-pg-data:
